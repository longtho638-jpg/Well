name = "quota-middleware"
main = "src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

[vars]
ENFORCEMENT_MODE = "hybrid"
BYPASS_ROUTES = "/health,/functions/usage-track,/functions/usage-analytics"

# Development
[dev]
port = 8787
local_protocol = "http"

# Production
[env.production]
route = { pattern = "raas.agencyos.network/api/*", zone_name = "agencyos.network" }
vars = { ENFORCEMENT_MODE = "hard", BYPASS_ROUTES = "/health,/functions/usage-track,/functions/usage-analytics" }

# KV Namespace
[[kv_namespaces]]
binding = "KV_STORE"
id = "" # Set via wrangler secret or CLI
preview_id = ""

# Secrets (set via `wrangler secret put <NAME>`)
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
