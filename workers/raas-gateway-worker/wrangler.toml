name = "raas-gateway-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
RAAS_API_URL = "https://raas.agencyos.network"
CACHE_TTL_SECONDS = 300
SUSPENSION_LOG_TTL_SECONDS = 2592000

# Development
[dev]
port = 8788
local_protocol = "http"

# Production
[env.production]
route = { pattern = "raas-gateway.agencyos.network/*", zone_name = "agencyos.network" }

# KV Namespaces
[[kv_namespaces]]
binding = "LICENSE_CACHE"
id = "b8ec26d288c64662b86bcd426563a46b"
preview_id = "b8ec26d288c64662b86bcd426563a46b"

[[kv_namespaces]]
binding = "SUSPENSION_LOG"
id = "a56aa94b992e4709a12c10a74cf739ff"
preview_id = "a56aa94b992e4709a12c10a74cf739ff"

[[kv_namespaces]]
binding = "MODEL_QUOTA_CACHE"
id = "fd0cf84a5b9740d0b48d6a79e456ed74"
preview_id = "fd0cf84a5b9740d0b48d6a79e456ed74"

[[kv_namespaces]]
binding = "ALERT_STATE"
id = "f548e31d6b4349fca090c8b6e15f717b"
preview_id = "f548e31d6b4349fca090c8b6e15f717b"

# Secrets (set via `wrangler secret put <NAME>`)
# - RAAS_API_KEY - RaaS Gateway API key for upstream validation
