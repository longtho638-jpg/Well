name = "roi-digest-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"
node_compat = true

# Cloudflare Worker types
types = ["@cloudflare/workers-types"]

[vars]
RESEND_API_KEY = ""
WEBHOOK_URL = "https://agencyos.network/api/webhooks/anomaly-alerts"
ENFORCEMENT_MODE = "hybrid"

# Cron trigger - every 5 minutes for anomaly detection
[triggers]
crons = ["*/5 * * * *"]

# Development
[dev]
port = 8788
local_protocol = "http"

# Production
[env.production]
vars = { RESEND_API_KEY = "", WEBHOOK_URL = "https://agencyos.network/api/webhooks/anomaly-alerts", ENFORCEMENT_MODE = "hard" }

# KV Namespace for usage cache
[[kv_namespaces]]
binding = "USAGE_KV"
id = "" # Set via wrangler secret or CLI
preview_id = ""

# R2 Bucket for alert audit logs
[[r2_buckets]]
binding = "ALERTS_R2"
bucket_name = "anomaly-alerts-audit"
preview_bucket_name = "anomaly-alerts-audit-preview"

# Secrets (set via `wrangler secret put <NAME>`)
# - SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - RESEND_API_KEY
# - JWT_SECRET
