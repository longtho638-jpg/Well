# WellNexus CD Pipeline - Deployment Automation
# Deploy to production after successful CI/CD

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-ci-status:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: CI đã thành công ✅
        run: echo "CI Pipeline đã thành công - sẵn sàng deploy"

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: check-ci-status
    environment:
      name: production
      url: https://wellnexus.vn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RESEND_API_KEY: ${{ secrets.VITE_RESEND_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: Output deployment URL
        run: |
          echo "🚀 Deployment successful!"
          echo "URL: ${{ steps.deploy.outputs.preview-url }}"

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-vercel
    timeout-minutes: 5

    steps:
      - name: Chờ deployment propagage
        run: sleep 30

      - name: Smoke test production
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=0
          PROD_URL="https://wellnexus.vn"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_STATUS=$(curl -sI "$PROD_URL" -o /dev/null -w "%{http_code}" --max-time 10 || echo "000")
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Production GREEN — HTTP 200"
              exit 0
            fi

            echo "⏳ Chờ 15s trước khi thử lại..."
            sleep 15
          done

          echo "❌ Production DOWN sau $MAX_ATTEMPTS attempts"
          exit 1

      - name: Validate homepage content
        run: |
          HOMEPAGE_CONTENT=$(curl -s https://wellnexus.vn)

          # Check for key content
          if echo "$HOMEPAGE_CONTENT" | grep -q "WellNexus"; then
            echo "✅ Homepage contains WellNexus branding"
          else
            echo "❌ Homepage missing branding"
            exit 1
          fi

          if echo "$HOMEPAGE_CONTENT" | grep -q "dashboard"; then
            echo "✅ Homepage contains dashboard link"
          else
            echo "❌ Homepage missing dashboard link"
            exit 1
          fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-vercel, smoke-test]
    if: always()

    steps:
      - name: Success notification
        if: ${{ needs.smoke-test.result == 'success' }}
        run: |
          echo "🎉 Deployment thành công!"
          echo "🌐 Production: https://wellnexus.vn"
          echo "✅ Smoke tests: PASSED"
          echo "📅 Thời gian: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Failure notification
        if: ${{ needs.smoke-test.result == 'failure' }}
        run: |
          echo "❌ Deployment thất bại!"
          echo "🔴 Cần kiểm tra ngay: https://wellnexus.vn"
          echo "📋 Chi tiết: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
