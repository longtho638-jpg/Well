# WellNexus CD Pipeline - Cloudflare Pages Deployment
# Deploy to Cloudflare Pages after successful CI/CD

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://wellnexus.pages.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_RESEND_API_KEY: ${{ secrets.VITE_RESEND_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=wellnexus

      - name: Output deployment URL
        run: |
          echo "🚀 Deployment successful!"
          echo "URL: https://wellnexus.pages.dev"

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-cloudflare
    timeout-minutes: 5

    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Smoke test production
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=0
          PROD_URL="https://wellnexus.pages.dev"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_STATUS=$(curl -sI "$PROD_URL" -o /dev/null -w "%{http_code}" --max-time 10 || echo "000")
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Production GREEN — HTTP 200"
              exit 0
            fi

            echo "⏳ Waiting 15s before retry..."
            sleep 15
          done

          echo "❌ Production DOWN after $MAX_ATTEMPTS attempts"
          exit 1

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare, smoke-test]
    if: always()

    steps:
      - name: Success notification
        if: ${{ needs.smoke-test.result == 'success' }}
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Production: https://wellnexus.pages.dev"
          echo "✅ Smoke tests: PASSED"
          echo "📅 Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Failure notification
        if: ${{ needs.smoke-test.result == 'failure' }}
        run: |
          echo "❌ Deployment failed!"
          echo "🔴 Check: https://wellnexus.pages.dev"
          echo "📋 Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
