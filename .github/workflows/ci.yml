name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow community PRs from forks (pull_request handles cross-repo PRs)
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-part-1:
    name: Tests Part 1 (Utils + Lib + Services)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate file sizes (strict)
        run: node scripts/validate-file-sizes-for-build-enforcement.mjs --strict
        working-directory: apps/well

      - name: Security audit
        run: pnpm audit --severity high || true
        working-directory: apps/well

      - name: Validate i18n keys
        run: pnpm run i18n:validate
        working-directory: apps/well

      - name: Run linter
        run: pnpm run lint || echo "Lint script not found, skipping"
        working-directory: apps/well

      - name: Run tests with coverage (Part 1)
        # Single-threaded to prevent esbuild resource crashes (CI/CD fix 2026-03-04)
        run: pnpm test --filter wellnexus-mvp -- --coverage src/utils/ src/lib/ src/services/ --maxWorkers=1

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-part-1
          path: apps/well/coverage/
          retention-days: 7

      - name: Build project
        run: pnpm run build
        working-directory: apps/well

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: apps/well/dist/
          retention-days: 7

  test-part-2:
    name: Tests Part 2 (Agents + Components)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests (Part 2)
        # Single-threaded to prevent esbuild resource crashes (CI/CD fix 2026-03-04)
        run: pnpm test --filter wellnexus-mvp -- src/agents/ src/components/ --maxWorkers=1

  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: [test-part-1, test-part-2]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium
        working-directory: apps/well

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: apps/well/playwright-report/
          retention-days: 7

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: [test-part-1, test-part-2]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 5

    steps:
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Smoke test production
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=0
          PROD_URL="https://wellnexus.vn"
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_STATUS=$(curl -sI "$PROD_URL" -o /dev/null -w "%{http_code}" --max-time 10 || echo "000")
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Production GREEN — HTTP 200"
              exit 0
            fi
            sleep 15
          done
          echo "❌ Production DOWN after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deploy SUCCESS: wellnexus.vn is live and responding HTTP 200"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deploy FAILED: wellnexus.vn is not responding"
