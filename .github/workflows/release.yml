# Automated Releases - Tạo GitHub Release khi có tag
name: Release Automation

on:
  push:
    tags:
      - 'v*'  # Trigger khi push tag có dạng v1.0.0, v2.3.1, etc.

  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (không có tiền tố v)'
        required: true
        type: string
        default: '3.0.0'
      is_prerelease:
        description: 'Đánh dấu là prerelease?'
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="v${VERSION}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG_NAME#v}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          echo "## 🚀 WellNexus v${VERSION}" >> changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            echo "So sánh từ $PREV_TAG..." >> changelog.md
            echo "" >> changelog.md

            # Get commits since last tag
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> changelog.md
          else
            echo "*Release đầu tiên*" >> changelog.md
          fi

          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "## 📦 Cài đặt nhanh" >> changelog.md
          echo "" >> changelog.md
          echo '```bash' >> changelog.md
          echo 'git clone https://github.com/longtho638-jpg/Well.git' >> changelog.md
          echo 'cd Well' >> changelog.md
          echo 'pnpm install' >> changelog.md
          echo '```' >> changelog.md

          cat changelog.md

      - name: Build project
        run: pnpm run build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: WellNexus v${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ github.event.inputs.is_prerelease || false }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output release info
        run: |
          echo "🎉 Release thành công!"
          echo "📦 Version: ${{ steps.get_version.outputs.VERSION }}"
          echo "🏷️ Tag: ${{ steps.get_version.outputs.TAG_NAME }}"
          echo "🔗 URL: ${{ steps.create_release.outputs.url }}"

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: create-release
    if: always()

    steps:
      - name: Release notification
        run: |
          echo "📢 WellNexus Release đã được tạo!"
          echo ""
          echo "✅ GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases"
          echo ""
          echo "📝 Các bước tiếp theo:"
          echo "1. Kiểm tra release notes"
          echo "2. Xác minh build artifacts"
          echo "3. Thông báo cộng đồng (Discord, Twitter, etc.)"
