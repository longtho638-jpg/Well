# Cloudflare Pages configuration for WellNexus
# Direct deploy with wrangler pages deploy

name = "wellnexus"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"

[vars]
NODE_ENV = "production"
VITE_APP_NAME = "WellNexus"

# Secrets (configure via Cloudflare dashboard):
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SENTRY_DSN
# - POLAR_PUBLIC_KEY
# - VITE_RAAS_LICENSE_KEY
