# Cloudflare Pages configuration for WellNexus
# For Pages, use wrangler.toml only for vars and secrets
# Build and deploy handled by GitHub Actions + Vercel

name = "wellnexus"
compatibility_date = "2024-01-01"

[vars]
NODE_ENV = "production"
VITE_APP_NAME = "WellNexus"

# Secrets (configure via Cloudflare dashboard or wrangler secret):
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SENTRY_DSN
# - POLAR_PUBLIC_KEY
# - VITE_RAAS_LICENSE_KEY
