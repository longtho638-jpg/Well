<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <rect width="512" height="512" fill="url(#bg-gradient)"/>

  <!-- Icon design: Layered hexagons representing network/MLM structure -->
  <g transform="translate(256, 256)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="200" fill="url(#glow-gradient)" opacity="0.3"/>

    <!-- Main icon: Stack of layers representing network levels -->
    <g transform="translate(0, -30)">
      <!-- Layer 3 (bottom) -->
      <path d="M -80 60 L -40 80 L 40 80 L 80 60 L 40 40 L -40 40 Z" fill="#F59E0B" opacity="0.6"/>

      <!-- Layer 2 (middle) -->
      <path d="M -70 30 L -30 50 L 30 50 L 70 30 L 30 10 L -30 10 Z" fill="#FBBF24" opacity="0.8"/>

      <!-- Layer 1 (top) -->
      <path d="M -60 0 L -20 20 L 20 20 L 60 0 L 20 -20 L -20 -20 Z" fill="#FCD34D"/>

      <!-- Center dot (you/root) -->
      <circle cx="0" cy="0" r="8" fill="white"/>
    </g>

    <!-- Brand text -->
    <text x="0" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
      W
    </text>
  </g>

  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow-gradient">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>
