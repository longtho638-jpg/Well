  <!-- Font Loading: Non-blocking via media="print" onload trick (est. -150ms render delay) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">

  <meta name="theme-color" content="#0F172A" id="meta-theme-color">
  <meta name="color-scheme" content="dark light">

  <!-- FOUC Prevention: Apply theme class before React hydration -->
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('wellnexus-theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.querySelector('#meta-theme-color').setAttribute('content', '#0F172A');
        } else {
          document.documentElement.classList.remove('dark');
          document.querySelector('#meta-theme-color').setAttribute('content', '#F3F4F6');
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
